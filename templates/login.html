<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }

        .navbar {
            background-color: #002147;
            color: white;
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .title {
            font-size: 18px;
            font-weight: 600;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .navbar ul li a {
            color: white;
            text-decoration: none;
            font-size: 15px;
        }

        .navbar ul li a:hover {
            text-decoration: underline;
        }

        .page-content {
            max-width: 420px;
            margin: 40px auto;
            background: white;
            padding: 24px;
            border-radius: 5px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="title">AI Question Paper Generator</div>
        <ul>
            <li data-nav="all"><a href="/">Home</a></li>
            <li data-nav="auth"><a href="/upload">Upload Syllabus</a></li>
            <li data-nav="manage"><a href="/admin">Manage Users</a></li>
            
            <li data-nav="guest"><a href="/login">Login</a></li>
            <li data-nav="guest"><a href="/signup">Sign Up</a></li>
            <li data-nav="auth"><a href="/logout">Logout</a></li>
        </ul>
    </div>

    <div class="page-content">
    <h2>Login</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <button type="submit">Login</button>
    </form>

    </div>

    <script>
        (function configureNavbar() {
            const isAuthenticated = "{{ 'true' if nav_is_authenticated else 'false' }}" === "true";
            const canManageUsers = "{{ 'true' if nav_can_manage_users else 'false' }}" === "true";

            document.querySelectorAll("[data-nav='auth']").forEach((item) => {
                item.style.display = isAuthenticated ? "" : "none";
            });
            document.querySelectorAll("[data-nav='guest']").forEach((item) => {
                item.style.display = isAuthenticated ? "none" : "";
            });
            document.querySelectorAll("[data-nav='manage']").forEach((item) => {
                item.style.display = canManageUsers ? "" : "none";
            });
        })();
    </script>
</body>
</html>
